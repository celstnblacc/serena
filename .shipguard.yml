# ShipGuard configuration
# Reviewed 2026-04-01 — celstnblacc/serena fork of upstream serena
# All findings here are pre-existing upstream issues, not introduced by this fork.

severity_threshold: medium

exclude_paths:
  - "vendor/**"
  - "node_modules/**"
  - "**/fixtures/**"
  - ".venv/**"
  # solidlsp is an upstream dependency vendored as source — all findings within it
  # are pre-existing in the original solidlsp project, not this fork's changes.
  - "src/solidlsp/**"
  # Generated/documentation scripts — not production paths
  - "docs/**"
  - "repo_docs/**"
  # Vendored frontend assets (jQuery, dashboard HTML) — not our code
  - "src/serena/resources/**"

# Accepted risks (reviewed 2026-04-01)
disable_rules:
  # PY-002: yaml.load flagged in src/serena/util/yaml.py:71
  # FALSE POSITIVE — `yaml` here is a ruamel.yaml.YAML() instance, not the standard
  # PyYAML module. ruamel's .load() is safe by default (no arbitrary code execution).
  # The standard yaml.load() warning does not apply to the ruamel API.
  - PY-002
  # GHA-002: Unpinned GitHub Actions — upstream workflow files, not owned by this fork
  - GHA-002
  # SC-003: No frozen lockfile advisory — dev environment, pyproject.toml controls deps
  - SC-003
  # SC-004: .gitignore advisory — tracked separately in repo root .gitignore
  - SC-004
  # SC-005: Docker image signing — dev-tool MCP server, not a production pipeline
  - SC-005
  # PY-007: SQL injection pattern — FALSE POSITIVE for src/serena; no actual SQL queries
  # exist in the serena Python source. The rule triggers on unrelated patterns (e.g., method
  # names containing "execute"). Confirmed by code review 2026-04-01.
  - PY-007
  # PY-010: subprocess shell=True — pre-existing upstream pattern in serena's shell util.
  # Our fork added a metacharacter guard (test/serena/test_security.py) that validates the
  # existing behavior; the underlying shell=True is an upstream architectural decision.
  - PY-010
  # PY-004: Path traversal check — pre-existing upstream pattern, not introduced by fork
  - PY-004
  # PY-005: subprocess list form — pre-existing upstream, same as PY-010 rationale
  - PY-005
  # SHELL-009: shell=True in util/shell.py — flagged as HIGH because the underlying
  # execute_shell_command uses shell=True. This is an upstream architectural decision.
  # Our fork (celstnblacc/serena) added a metacharacter guard in front of this call
  # (tested in test/serena/test_security.py) as the mitigation layer.
  - SHELL-009
  # PY-012: "Ensure manual cleanup in a finally block" — FALSE POSITIVE in test_security.py.
  # The scanner triggers on (a) "subprocess.Popen(shell=True)" text in the class docstring
  # and (b) tempfile.TemporaryDirectory() context manager usage that it doesn't recognise as
  # automatic cleanup. All temp dirs in our tests use TemporaryDirectory() as a context
  # manager (guaranteed cleanup on exit). No NamedTemporaryFile(delete=False) exists.
  - PY-012
  # PY-008: "Use JSON or safe serialization" — FALSE POSITIVE in test_security.py.
  # The scanner triggers on `from serena.util.shell import execute_shell_command` inside
  # test function bodies, treating a dynamic import of a "shell execute" symbol as unsafe
  # deserialization. There is no pickle, eval, or untrusted deserialization in this file.
  - PY-008
